model:
  name_or_path: "mistralai/Mistral-7B-Instruct-v0.2"
  use_4bit: true
  use_8bit: false

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "../checkpoints/mistral-math-hi"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  optim: "paged_adamw_32bit"
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_seq_length: 1024
  bf16: true
  gradient_checkpointing: true
